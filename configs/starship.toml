# THIS IS THE STARSHIP CONFIG TO MAKE THE TERMINAL LOOK NICE

# в”Җв”Җв”Җ FOR AGENTS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

#  DO NOT REMOVE THE оӮҙ characters

# Resources
# - Icons: https://www.nerdfonts.com/cheat-sheet
# - Fonts: https://www.nerdfonts.com/font-downloads


# Starship prompt configuration
# Docs: https://starship.rs/config/
# Schema for editor autocompletion
"$schema" = 'https://starship.rs/config-schema.json'

# в”Җв”Җв”Җ Cursor Dark Palette в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Background:  #141414          Foreground: #FFFFFF
# Ansi 0:  #2A2A2A (black)      Ansi 8:  #505050 (bright black)
# Ansi 1:  #BF616E (red)        Ansi 9:  #BF616E (bright red)
# Ansi 2:  #A3BE8C (green)      Ansi 10: #A3BE8C (bright green)
# Ansi 3:  #EBCB8B (yellow)     Ansi 11: #EBCB8B (bright yellow)
# Ansi 4:  #81A1C1 (blue)       Ansi 12: #81A1C1 (bright blue)
# Ansi 5:  #B48EAD (magenta)    Ansi 13: #B48EAD (bright magenta)
# Ansi 6:  #88C0D0 (cyan)       Ansi 14: #88C0D0 (bright cyan)
# Ansi 7:  #D8DEEA (white)      Ansi 15: #FFFFFF (bright white)

# в”Җв”Җв”Җ Prompt Layout в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Each segment uses powerline rounded characters ( and ) to create
# the "pill" / segmented bar appearance. The prompt ends with a newline
# followed by the $character module (the вҖә cursor indicator).
format = """
[оӮ¶](fg:#81A1C1)\
$directory\
[оӮҙ](fg:#81A1C1 bg:#2A2A2A)\
$git_branch\
$git_status\
[оӮҙ](fg:#2A2A2A bg:#1E1E1E)\
$nodejs\
$rust\
$golang\
$php\
$cmd_duration\
[оӮҙ](fg:#1E1E1E)\
\n у°Ҡ (fg:#000000) """

# вӨ·


right_format = """[](fg:#141414)$time"""

# в”Җв”Җв”Җ Directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Shows the current working directory. Background is Cursor Dark blue (#81A1C1).
# fg is the terminal background (#141414) for contrast against the bright accent.
[directory]
style = "fg:#141414 bg:#81A1C1"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

# Common directory aliases shown as icons instead of full names
[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# в”Җв”Җв”Җ Git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Shows the current git branch name and repo status indicators.
[git_branch]
symbol = ""
style = "bg:#2A2A2A"
format = '[[ $symbol $branch ](fg:#81A1C1 bg:#2A2A2A)]($style)'

[git_status]
style = "bg:#2A2A2A"
format = '[[($all_status$ahead_behind )](fg:#81A1C1 bg:#2A2A2A)]($style)'

# в”Җв”Җв”Җ Language Runtimes в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# These modules only appear when the relevant project files are detected
# in the current directory (e.g. package.json, Cargo.toml, go.mod, etc.)
[nodejs]
symbol = ""
style = "bg:#1E1E1E"
format = '[[ $symbol ($version) ](fg:#81A1C1 bg:#1E1E1E)]($style)'

[rust]
symbol = ""
style = "bg:#1E1E1E"
format = '[[ $symbol ($version) ](fg:#81A1C1 bg:#1E1E1E)]($style)'

[golang]
symbol = ""
style = "bg:#1E1E1E"
format = '[[ $symbol ($version) ](fg:#81A1C1 bg:#1E1E1E)]($style)'

[php]
symbol = ""
style = "bg:#1E1E1E"
format = '[[ $symbol ($version) ](fg:#81A1C1 bg:#1E1E1E)]($style)'

# в”Җв”Җв”Җ Command Duration в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Shows how long the last command took, for commands over 2 seconds.
[cmd_duration]
min_time = 2_000
format = '[[ уұҰҹ $duration ](fg:#EBCB8B bg:#1E1E1E)]($style)'
style = "bg:#1E1E1E"

# в”Җв”Җв”Җ Time в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Displays the current time at the right end of the prompt bar.
[time]
disabled = false
time_format = "%H:%M"
style = "bg:#141414"
format = '[[$time](fg:#505050)]($style)'
